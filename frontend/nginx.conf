server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Redireciona requisições para a SPA
    location / {
        try_files $uri /index.html;
    }

    # Bloco de proxy para o backend
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Permitir CORS (opcional se o backend já estiver configurado)
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PUT";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type";
    }

    # Nova localização para servir as imagens do backend
    location /public/ {
        alias /usr/share/nginx/backend_public/;
        autoindex on;  # Opcional: lista os arquivos, se necessário
    }
}
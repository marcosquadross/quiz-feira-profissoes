services:
  redis:
    image: redis:7.2
    container_name: redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes", "--notify-keyspace-events", "Ex"]
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "8001:8001"
    restart: unless-stopped
    depends_on:
      - redis

volumes:
  redis_data:
